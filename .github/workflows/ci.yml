name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install -e ".[dev]"
          python -m playwright install chromium

      - name: Ruff
        shell: pwsh
        run: python -m ruff check app tests

      - name: Mixin method guard
        shell: pwsh
        run: python scripts/check_mixin_methods.py

      - name: Run tests
        shell: pwsh
        run: python -m pytest tests/ -q
