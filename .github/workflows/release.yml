name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install -e ".[dev,build]"
          python -m playwright install chromium

      - name: Run tests
        shell: pwsh
        run: |
          for ($i = 1; $i -le 3; $i++) {
            python -m pytest tests/ -q
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "::warning::pytest attempt $i failed (exit $LASTEXITCODE), retrying..."
          }
          exit $LASTEXITCODE

      - name: Build portable Windows package
        shell: pwsh
        run: ./scripts/build.ps1 -SkipTests

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag `
            dist/Scenaria-Portable.zip `
            dist/Scenaria-update.zip `
            dist/latest.json `
            --title "Scenaria $tag" `
            --generate-notes
